<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<title>Pizza AR</title>
</head>

<body style="margin:0;">

<model-viewer
src="./pizza.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="1"
style="width:100%; height:100vh;">
</model-viewer>

</body>
</html>
